            border-bottom-color: #C5A367 !important;

        /* Floating label styles */
        .peer:focus ~ label,
        .peer:not(:placeholder-shown) ~ label {
            transform: translateY(-1.5rem);
            font-size: 0.75rem;
            letter-spacing: 0.1em;

<body class="text-on-surface selection:bg-heritage-gold/20 flex flex-col h-screen overflow-hidden">
<!-- TopNavBar -->
<header class="absolute w-full top-0 bg-transparent z-50 pointer-events-none">
<div class="flex justify-between items-center w-full px-margin-desktop py-6 max-w-container-max mx-auto pointer-events-auto">


<div class="flex items-center space-x-6 bg-surface/80 px-4 py-2 backdrop-blur-sm rounded-sm">
<button class="cursor-pointer transition-opacity duration-200 active:opacity-70">

</button>

</div>
</div>
</header>
<!-- Main Split Layout -->

<!-- Left: Atmospheric Image -->
<div class="hidden md:block md:w-[55%] lg:w-[60%] relative h-full overflow-hidden">

<div class="absolute inset-0 bg-black/10"></div>
</div>

<!-- Branding/Heading -->
<div class="mb-12">
<h1 class="font-headline-lg text-[40px] md:text-[48px] leading-tight text-on-tertiary mb-4">The Heritage Awaits</h1>
<p class="font-body-md text-body-md text-on-tertiary/80">Sign in to your SilverLooms account</p>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 px-6 py-4 bg-transparent border border-on-tertiary/20 hover:border-heritage-gold transition-all duration-300 group">

<span class="font-label-caps text-label-caps uppercase tracking-widest text-on-tertiary">Continue with Google</span>

<!-- Divider -->
<div class="relative flex items-center py-10">
<div class="flex-grow border-t border-on-tertiary/10"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-on-tertiary/40">OR</span>
<div class="flex-grow border-t border-on-tertiary/10"></div>
</div>
<!-- Form -->
<form class="space-y-10">
<!-- Email -->
<div class="relative pt-2">
<input class="peer w-full bg-transparent border-t-0 border-x-0 border-b border-on-tertiary/20 px-0 py-2 font-body-md text-body-md text-on-tertiary transition-all focus:border-heritage-gold focus:ring-0 placeholder-transparent" id="email" name="email" placeholder="Email Address" type="email">
<label class="absolute left-0 top-4 font-body-md text-body-md text-on-tertiary/60 transition-all duration-300 pointer-events-none" for="email">Email Address</label>
</div>
<!-- Password -->
<div class="relative pt-2">
<input class="peer w-full bg-transparent border-t-0 border-x-0 border-b border-on-tertiary/20 px-0 py-2 font-body-md text-body-md text-on-tertiary transition-all focus:border-heritage-gold focus:ring-0 placeholder-transparent" id="password" name="password" placeholder="Password" type="password">
<label class="absolute left-0 top-4 font-body-md text-body-md text-on-tertiary/60 transition-all duration-300 pointer-events-none" for="password">Password</label>
<div class="absolute right-0 top-4">
<a class="font-label-caps text-[10px] text-heritage-gold hover:text-on-tertiary transition-colors tracking-wider uppercase" href="#">Forgot?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-surface text-onyx-deep font-label-caps text-[13px] uppercase tracking-[0.15em] hover:bg-heritage-gold transition-colors duration-500 active:scale-[0.98] transform py-6 mt-4" type="submit">
                    Sign In
                </button>
</form>
<!-- Secondary CTA -->
<div class="mt-12 text-center pt-8 border-t border-on-tertiary/5">
<p class="font-body-md text-body-md text-on-tertiary/80">
                    New to SilverLooms?
                    <a class="text-on-tertiary font-bold border-b border-on-tertiary/20 hover:border-heritage-gold transition-all ml-1" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Mini Footer -->
<div class="mt-auto pt-16 pb-4 w-full flex justify-center gap-6">
<a class="font-label-caps text-[10px] text-on-tertiary/40 hover:text-on-tertiary uppercase tracking-widest transition-colors" href="#">Privacy</a>
<a class="font-label-caps text-[10px] text-on-tertiary/40 hover:text-on-tertiary uppercase tracking-widest transition-colors" href="#">Terms</a>
</div></div>
</main>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Simple entrance reveal
        const formContent = document.querySelector('main > div:last-child > div:first-child');
        if (formContent) {
            formContent.style.opacity = '0';
            formContent.style.transform = 'translateY(10px)';
            setTimeout(() => {
                formContent.style.transition = 'opacity 0.8s ease-out, transform 0.8s ease-out';
                formContent.style.opacity = '1';
                formContent.style.transform = 'translateY(0)';
            }, 100);
        }
    });
</script>
